server.port=${PORT:8080}
spring.application.name=epp-demo

# Usa variables de entorno si existen (Railway las inyecta solas);
# si no existen, cae en tu configuracion local de siempre.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/checksafe_db?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
